<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Imprimir Etiquetas 100x50mm</title>
    <style>
        @page {
            size: 100mm 50mm;
            margin: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }

        .no-print {
            text-align: center;
            padding: 20px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .label-grid {
            display: block;
            margin: 0 auto;
            padding: 20px;
            max-width: 100mm;
        }

        .label {
            width: 100mm;
            height: 50mm;
            box-sizing: border-box;
            background: white;
            position: relative;
            overflow: hidden;
            display: block;
            padding: 4mm;
            margin-bottom: 5mm;
            border: 1px dashed #ccc;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1mm;
            height: 5mm;
        }

        .category {
            font-size: 11pt;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
            text-align: right;
            width: 100%;
        }

        .product-name {
            font-size: 24pt;
            font-weight: 900;
            text-align: center;
            line-height: 1;
            margin-top: 2mm;
            margin-bottom: 3mm;
            height: 18mm;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .barcode-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .barcode-img {
            height: 16mm;
            max-width: 70mm;
            display: block;
        }

        .barcode-text {
            display: none;
        }

        .item-number-badge {
            font-size: 24pt;
            font-weight: 900;
            background: #000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 6px;
            margin-top: 3mm;
            display: inline-block;
        }

        .price-tag {
            text-align: right;
            padding-left: 4mm;
        }

        .price-label {
            font-size: 9pt;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }

        .price-value {
            font-size: 28pt;
            font-weight: 900;
            color: #000;
            line-height: 1;
        }

        @media print {
            body {
                background: white;
            }

            .no-print {
                display: none;
            }

            .label-grid {
                display: block;
                padding: 0;
                background: white;
            }

            .label {
                border: none;
                margin: 0;
                page-break-after: always;
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body>
    <div class="no-print">
        <h2>Vista Previa (100mm x 50mm)</h2>
        <p>Configura tu impresora en tamaño: <b>100mm x 50mm</b>.</p>
        <button onclick="window.print()"
            style="padding: 12px 24px; font-size: 18px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold;">🖨️
            IMPRIMIR</button>
        <button onclick="window.close()"
            style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin-left:12px; border: 1px solid #ccc; background: white; border-radius: 8px;">Cerrar</button>
    </div>

    <div class="label-grid">
        {% for item in labels %}
        <div class="label">
            <div class="header" style="text-align: right; margin-bottom: 2mm;">
                <span class="category" style="float: right;">{{ item.category or '' }}</span>
            </div>

            <div class="product-name" style="clear: both; width: 100%; text-align: center;">{{ item.name }}</div>

            <div class="footer-area" style="position: absolute; bottom: 4mm; left: 4mm; right: 4mm; display: flex; justify-content: space-between; align-items: flex-end;">
                <div class="barcode-area" style="text-align: center;">
                    <img src="/static/barcodes/{{ item.barcode_file }}" class="barcode-img" alt="{{ item.barcode }}">
                    {% if item.item_number %}
                    <div class="item-number-badge">Art: {{ item.item_number }}</div>
                    {% endif %}
                </div>

                <div class="price-tag" {% if hide_price %}style="visibility:hidden;"{% endif %}>
                    <div class="price-label">Precio</div>
                    <div class="price-value">${{ "{:,.0f}".format(item.price) }}</div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>

</html>
